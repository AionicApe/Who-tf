  .board-title {
    text-align: center; font-family: 'Special Elite', monospace;
    font-size: clamp(26px, 5vw, 44px); letter-spacing: 1px; color: #f4ecd8;
    padding: 26px 16px 6px; margin: 0;
    text-shadow: 0 2px 0 #000, 0 0 26px rgba(0,0,0,0.6);
    transform: rotate(-1deg);
  }
  .board-scene { position: relative; max-width: 900px; margin: 0 auto; }
  .magnifier { position: absolute; opacity: 0.55; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.6)); pointer-events: none; }
  .magnifier.mg-1 { top: -6px; left: 6px; width: 64px; transform: rotate(-18deg); }
  .magnifier.mg-2 { top: 10px; right: 2px; width: 52px; transform: rotate(14deg); }
  @media (max-width: 700px) {
    .magnifier { width: 40px !important; }
  }
  .dossier-app {
    --void: #050408; --void-2: #0d0b12; --paper: #241c14; --paper-dim: #cabb8c; --paper-line: #56462a;
    --ink: #f2e9d8; --ink-soft: #b8a888; --redaction: #000000;
    --stamp-red: #c1524a; --stamp-green: #4a9973; --gold: #c9a44c; --gold-bright: #e8c877;
    --paper-shadow: rgba(0,0,0,0.75); --glow: rgba(214,168,90,0.10);
    font-family: 'Libre Baskerville', Georgia, serif;
    color: var(--paper-dim);
    background: transparent;
    min-height: 100vh; padding: 10px 16px 60px; box-sizing: border-box; position: relative;
  }
  .dossier-app * { box-sizing: border-box; }
  .dossier-app .wrap { max-width: 800px; margin: 0 auto; }
  .dossier-app .tab { display: inline-block; background: var(--void); border: 1px solid var(--gold); border-bottom: none; color: var(--gold-bright); font-family: 'Special Elite', monospace; font-size: 12px; letter-spacing: 2px; padding: 7px 18px 6px; border-radius: 3px 3px 0 0; transform: translateY(1px); margin-left: 24px; }
  .dossier-app .conn-status { float: right; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 1px; padding: 7px 12px 6px; color: #d8e8dd; background: var(--stamp-green); border-radius: 3px 3px 0 0; margin-right: 4px; }
  .dossier-app .conn-status.off { background: var(--stamp-red); color: #f3dcdc; }
  .dossier-app .volume-control { float: right; margin-right: 4px; padding: 8px 10px 6px; background: var(--void); border-radius: 3px 3px 0 0; display: inline-flex; align-items: center; }
  .dossier-app .volume-control input[type="range"] { -webkit-appearance: none; appearance: none; width: 80px; height: 4px; background: var(--paper-line); border-radius: 2px; outline: none; cursor: pointer; vertical-align: middle; }
  .dossier-app .volume-control input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--gold-bright); border: 1px solid var(--gold); box-shadow: 0 0 6px var(--glow); }
  .dossier-app .volume-control input[type="range"]::-moz-range-thumb { width: 13px; height: 13px; border-radius: 50%; background: var(--gold-bright); border: 1px solid var(--gold); box-shadow: 0 0 6px var(--glow); }
  .dossier-app .folder { background: var(--paper); border: 1px solid #4a3d24; border-radius: 2px; box-shadow: 0 40px 90px -20px var(--paper-shadow), 0 0 90px -10px var(--glow), 0 2px 0 var(--paper-line); padding: 34px 30px 30px; position: relative; background-image: repeating-linear-gradient(transparent, transparent 27px, rgba(60,48,24,0.08) 28px); }
  .dossier-app h1.title { font-family: 'Special Elite', monospace; font-size: 26px; letter-spacing: 1px; margin: 10px 0 2px; text-align: center; color: var(--ink); }
  .dossier-app .subtitle { text-align: center; color: var(--ink-soft); font-style: italic; font-size: 14px; margin: 0 0 26px; }
  .dossier-app .divider { border: none; border-top: 2px dashed var(--paper-line); margin: 22px 0; }
  .dossier-app label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
  .dossier-app input[type="text"] { width: 100%; font-family: 'Libre Baskerville', serif; font-size: 15px; padding: 10px 12px; border: 1px solid var(--paper-line); background: var(--paper); color: var(--ink); border-radius: 2px; outline: none; }
  .dossier-app input[type="text"]:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(179,144,63,0.25); }
  .dossier-app .field { margin-bottom: 18px; }
  .dossier-app button { font-family: 'Special Elite', monospace; font-size: 13px; letter-spacing: 1px; border: 1px solid var(--gold); background: var(--void); color: var(--gold-bright); padding: 11px 20px; border-radius: 2px; cursor: pointer; transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease; }
  .dossier-app button:hover { background: #1c1710; box-shadow: 0 0 14px -2px var(--glow); }
  .dossier-app button:active { transform: translateY(1px); }
  .dossier-app button.secondary { background: transparent; color: var(--ink); border-color: var(--paper-line); }
  .dossier-app button.secondary:hover { background: rgba(23,19,13,0.08); box-shadow: none; }
  .dossier-app button:disabled { opacity: 0.4; cursor: not-allowed; }
  .dossier-app button.wide { width: 100%; }
  .dossier-app .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

<body>
<div class="dossier-app" id="dossierApp">
  <div class="board-scene">
    <svg class="magnifier mg-1" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="17" fill="rgba(230,220,190,0.12)" stroke="#e8c877" stroke-width="3"/>
      <line x1="39" y1="39" x2="58" y2="58" stroke="#e8c877" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <svg class="magnifier mg-2" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="17" fill="rgba(230,220,190,0.12)" stroke="#e8c877" stroke-width="3"/>
      <line x1="39" y1="39" x2="58" y2="58" stroke="#e8c877" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <h1 class="board-title">Who the fuck&hellip;</h1>
  </div>
  <div class="wrap">
    <span class="conn-status off" id="connStatus">NOT CONNECTED</span>
    <span class="conn-status off" id="musicToggle" style="cursor:pointer;">🔊 AUDIO OFF</span>
    <span class="volume-control">
      <input type="range" id="musicVolume" min="0" max="100" value="35" />
    </span>
    <div class="tab">CASE FILES DIVISION · 2–6 INVESTIGATORS</div>
    <div class="folder" id="screenRoot"></div>
  </div>
</div>

<!-- Hidden YouTube player: powers the in-game music queue. Never re-created on
     re-render since it lives outside #screenRoot. -->
<div id="ytPlayerHost" style="position:absolute; left:-9999px; top:-9999px; width:1px; height:1px; overflow:hidden;"></div>

<script>
(function(){
  const CHAR_LIST = [
    {n:"Sherlock Holmes"},{n:"Harry Potter"},{n:"Batman"},{n:"Spider-Man"},{n:"Darth Vader"},
    {n:"Mickey Mouse"},{n:"SpongeBob SquarePants"},{n:"Homer Simpson"},{n:"Iron Man"},{n:"Wonder Woman"},
    {n:"Elsa"},{n:"Shrek"},{n:"Yoda"},{n:"James Bond"},{n:"Indiana Jones"},
    {n:"Hermione Granger"},{n:"The Joker"},{n:"Superman"},{n:"Captain America"},{n:"Black Panther"},
    {n:"Winnie the Pooh"},{n:"Pikachu"},{n:"Mario"},{n:"Luke Skywalker"},{n:"Gandalf"},
    {n:"Frodo Baggins"},{n:"Buzz Lightyear"},{n:"Woody"},{n:"Simba"},{n:"Aladdin"},
    {n:"Cinderella"},{n:"Snow White"},{n:"Peter Pan"},{n:"Sonic the Hedgehog"},{n:"Bugs Bunny"},
    {n:"Scooby-Doo"},{n:"Optimus Prime"},{n:"Thor"},{n:"The Hulk"},{n:"Dora the Explorer"},
    {n:"Albert Einstein"},{n:"Abraham Lincoln"},{n:"Leonardo da Vinci"},{n:"William Shakespeare"},
    {n:"Beyoncé"},{n:"Taylor Swift"},{n:"Michael Jackson"},{n:"Elvis Presley"},{n:"Oprah Winfrey"},
    {n:"Serena Williams"},{n:"LeBron James"},{n:"Cristiano Ronaldo"},{n:"Lionel Messi"},
    {n:"Barack Obama"},{n:"Queen Elizabeth II"},{n:"Marilyn Monroe"},{n:"Elon Musk"},{n:"Steve Jobs"},
    {n:"Walt Disney"},{n:"Mahatma Gandhi"},{n:"Amelia Earhart"},{n:"Cleopatra"},{n:"Isaac Newton"}
  ].sort((a,b)=>a.n.localeCompare(b.n));

  const CODE_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  const PEER_PREFIX = "dossiergame3p-";
  const root = document.getElementById('screenRoot');
  const connStatusEl = document.getElementById('connStatus');

  let state = {
    screen: 'landing', code:null, name:null, role:null, isHost:false, room:null, error:null,
    characterSearch:'', selectedChar:null, showGuessBox:false, playerCount:3, notes:'', queueError:null,
    peer:null, conns:{}, hostConn:null, connectedCount:0
  };
  let pendingResume = null;

  function genCode(){ let c=''; for(let i=0;i<5;i++) c += CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)]; return c; }
  function esc(s){ const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
  function nextRole(order, r){ return order[(order.indexOf(r)+1)%order.length]; }
  function prevRole(order, r){ return order[(order.indexOf(r)+order.length-1)%order.length]; }
  function nextUnsolvedRole(room, fromRole){
    let r = fromRole;
    for(let i=0;i<room.order.length;i++){
      r = nextRole(room.order, r);
      if(!room.solved[r]) return r;
    }
    return null;
  }
  function setConnStatus(on){ connStatusEl.textContent = on ? 'CONNECTED' : 'NOT CONNECTED'; connStatusEl.classList.toggle('off', !on); }

  function newRoom(hostName, playerCount){
    const order = Array.from({length: playerCount}, (_, i) => 'p' + (i+1));
    const players = {}, assignments = {}, submitted = {}, guessCounts = {}, solved = {}, turnsTaken = {};
    order.forEach((role, i) => {
      players[role] = i === 0 ? { name: hostName, joined:true } : { name:null, joined:false };
      assignments[role] = null; submitted[role] = false; guessCounts[role] = 0; solved[role] = false; turnsTaken[role] = 0;
    });
    return {
      status: 'lobby', order, players, assignments, submitted, guessCounts, solved, turnsTaken,
      turn: 'p1', pending: null, log: [], winner: null, solveOrder: [], loser: null, musicQueue: [], nowPlaying: null
    };
  }

  // ---------- Shared game-state reducer (runs on host only) ----------
  function applyAction(room, byRole, action, payload){
    if(action === 'submitCharacter'){
      const owner = prevRole(room.order, byRole);
      if(room.submitted[owner]) return;
      room.assignments[owner] = payload.text;
      room.submitted[owner] = true;
      if(room.order.every(r => room.submitted[r])){ room.status = 'playing'; room.turn = room.order[0]; }
    } else if(action === 'ask' || action === 'guess'){
      if(room.status !== 'playing' || room.pending || room.turn !== byRole || room.solved[byRole]) return;
      room.turnsTaken[byRole] = (room.turnsTaken[byRole] || 0) + 1;
      if(action === 'guess') room.guessCounts[byRole] = (room.guessCounts[byRole] || 0) + 1;
      room.pending = { by: byRole, type: action === 'ask' ? 'question' : 'guess', text: payload.text };
      room.log.push({ role: byRole, type: room.pending.type, text: payload.text, response: null, respondedBy: null, ts: Date.now() });
    } else if(action === 'respond'){
      if(!room.pending || room.pending.by === byRole) return;
      const lastEntry = room.log[room.log.length - 1];
      if(!lastEntry || lastEntry.response !== null) return;
      lastEntry.response = payload.resp;
      lastEntry.respondedBy = byRole;
      if(room.pending.type === 'guess' && payload.resp === 'correct'){
        const solver = room.pending.by;
        room.solved[solver] = true;
        room.solveOrder.push(solver);
        room.pending = null;
        const unsolved = room.order.filter(r => !room.solved[r]);
        if(unsolved.length <= 1){
          room.status = 'ended'; room.loser = unsolved[0] || null; room.winner = room.solveOrder[0];
        } else {
          room.turn = nextUnsolvedRole(room, solver);
        }
      } else {
        const asker = room.pending.by;
        room.pending = null;
        room.turn = nextUnsolvedRole(room, asker);
      }
    } else if(action === 'queueAdd'){
      if(!payload.videoId) return;
      const item = { id: 'q' + Date.now() + Math.random().toString(36).slice(2, 6), videoId: payload.videoId, addedBy: byRole };
      room.musicQueue.push(item);
      if(!room.nowPlaying){
        room.musicQueue.shift();
        room.nowPlaying = { videoId: item.videoId, startedAt: Date.now(), addedBy: item.addedBy, queueId: item.id };
      }
    } else if(action === 'queueSkip'){
      if(room.musicQueue.length > 0){
        const next = room.musicQueue.shift();
        room.nowPlaying = { videoId: next.videoId, startedAt: Date.now(), addedBy: next.addedBy, queueId: next.id };
      } else {
        room.nowPlaying = null;
      }
    }
  }

  function broadcastState(){
    Object.keys(state.conns).forEach(role => {
      const c = state.conns[role];
      if(c && c.open) c.send({ type: 'state', room: state.room });
    });
    saveSession();
  }

  // ---------- Session persistence (survives page refresh — real localStorage,
  // not the Claude-artifact one, since this file runs standalone) ----------
  const SESSION_KEY = 'dossierGameSession_v1';
  function saveSession(){
    try {
      if(!state.code || !state.name) return;
      localStorage.setItem(SESSION_KEY, JSON.stringify({
        code: state.code, name: state.name, isHost: state.isHost, role: state.role,
        playerCount: state.playerCount, room: state.isHost ? state.room : null
      }));
    } catch(e){ /* storage unavailable — ignore, feature just won't persist */ }
  }
  function loadSession(){
    try { const raw = localStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return null; }
  }
  function clearSession(){
    try { localStorage.removeItem(SESSION_KEY); } catch(e){}
  }

  function doAction(action, payload){
    if(state.isHost){
      applyAction(state.room, state.role, action, payload);
      broadcastState();
      render();
    } else if(state.hostConn && state.hostConn.open){
      state.hostConn.send({ type: 'action', by: state.role, action, payload });
    }
  }

  // ---------- Host-side connection handling ----------
  function wireHostIncoming(conn){
    conn.on('data', msg => {
      if(msg.type === 'join'){
        const r = state.room;
        let role = null;
        const seats = r.order.slice(1); // all non-host seats
        const matched = seats.find(s => r.players[s].joined && r.players[s].name === msg.name);
        if(matched){ role = matched; }
        else {
          const openSeat = seats.find(s => !r.players[s].joined);
          if(openSeat){ r.players[openSeat] = { name: msg.name, joined:true }; role = openSeat; }
          else { conn.send({ type: 'full' }); return; }
        }
        state.conns[role] = conn;
        conn.send({ type: 'assignedRole', role });
        if(seats.every(s => r.players[s].joined) && r.status === 'lobby') r.status = 'setup';
        broadcastState();
        render();
      } else if(msg.type === 'action'){
        applyAction(state.room, msg.by, msg.action, msg.payload);
        broadcastState();
        render();
      }
    });
    conn.on('close', () => { render(); });
  }

  // ---------- Screens ----------

  function renderResume(){
    const s = pendingResume;
    root.innerHTML = `
      <h1 class="title">WELCOME BACK</h1>
      <p class="subtitle">You were in case <strong>${esc(s.code)}</strong> as ${esc(s.name)}${s.isHost ? ' (case-opener)' : ''}. Reconnect?</p>
      ${state.error ? `<div class="error-msg">${esc(state.error)}</div>` : ''}
      <div class="btn-row">
        <button class="secondary" id="btnStartFresh">Start Fresh</button>
        <button id="btnResume">Resume Case</button>
      </div>
    `;
    document.getElementById('btnStartFresh').onclick = () => {
      clearSession(); pendingResume = null; state.error = null; state.screen = 'landing'; render();
    };
    document.getElementById('btnResume').onclick = async () => {
      state.error = null;
      root.innerHTML = `<p class="waiting-line">Loading connection library<span class="dots"></span></p>`;
      const ready = await window.__peerjsReady;
      if(!ready){
        state.error = 'Could not load the connection library from any source. Try a different network or browser.';
        render(); return;
      }
      if(s.isHost){
        startHost(s.name, s.playerCount || (s.room && s.room.order ? s.room.order.length : 3), s.code, s.room);
      } else {
        connectAsGuest(s.code, s.name);
      }
    };
  }

  function renderLanding(){
    root.innerHTML = `
      <h1 class="title">THE DOSSIER</h1>
      <p class="subtitle">A 2–6 player identity case. Solve your own file first.</p>
      <div class="choice-row">
        <div class="choice-card" id="btnGoCreate"><h3>OPEN A NEW CASE</h3><p>Start a room for 3 and get a code to share.</p></div>
        <div class="choice-card" id="btnGoJoin"><h3>JOIN A CASE</h3><p>Enter a code you were given.</p></div>
      </div>
      <details class="rules">
        <summary>How to play (2–6 players)</summary>
        <ol>
          <li>One player opens a case, picks the number of investigators (2–6), and shares the code with the rest. Everyone needs an internet connection when connecting (no accounts needed).</li>
          <li>Each player secretly types an identity for exactly one other player, in a rotation — but once the game starts, that identity is visible to everyone else at the table, not just the one who set it. Only you can't see your own.</li>
          <li>Turns rotate in order. On your turn, ask a yes/no question about your own identity, or make a guess instead. Guesses are counted and shown on the scoreboard.</li>
          <li>Anyone else at the table can jump in to answer a question or judge a guess — whoever responds first.</li>
          <li>Correctly guessing your identity takes you out of the turn rotation, but you stick around to keep answering questions for the others.</li>
          <li>Play continues until only one investigator is left unsolved — everyone else has cracked their case, so that final investigator takes last place.</li>
          <li>Use the private Notes section to track clues — only you can see it.</li>
          <li>Note: the case-opener's browser tab must stay open for the whole game — closing it ends the case.</li>
        </ol>
      </details>
    `;
    document.getElementById('btnGoCreate').onclick = () => { state.screen='create'; state.error=null; render(); };
    document.getElementById('btnGoJoin').onclick = () => { state.screen='join'; state.error=null; render(); };
  }

  function renderCreate(){
    root.innerHTML = `
      <h1 class="title">OPEN A NEW CASE</h1>
      <p class="subtitle">You'll get a code to send to your co-investigators.</p>
      <div class="field"><label>Your name</label><input type="text" id="inpName" maxlength="24" placeholder="e.g. Agent Rowe" /></div>
      <div class="field"><label>Number of investigators</label>
        <div class="btn-row">${[2,3,4,5,6].map(n => `<button type="button" class="secondary count-chip${state.playerCount===n?' selected':''}" data-count="${n}">${n}</button>`).join('')}</div>
      </div>
      ${state.error ? `<div class="error-msg">${esc(state.error)}</div>` : ''}
      <div class="btn-row"><button class="secondary" id="btnBack">Back</button><button id="btnCreate">Open Case</button></div>
    `;
    document.querySelectorAll('.count-chip').forEach(btn => {
      btn.onclick = () => { state.playerCount = parseInt(btn.getAttribute('data-count'), 10); render(); };
    });
    document.getElementById('btnBack').onclick = () => { state.screen='landing'; render(); };
    document.getElementById('btnCreate').onclick = async () => {
      const name = document.getElementById('inpName').value.trim();
      if(!name){ state.error = 'Enter a name so your partners know it\'s you.'; render(); return; }
      state.name = name; state.error = null;
      root.innerHTML = `<p class="waiting-line">Loading connection library<span class="dots"></span></p>`;
      const ready = await window.__peerjsReady;
      if(!ready){
        state.error = 'Could not load the connection library from any source. This usually means a firewall, VPN, or browser extension is blocking script downloads. Try a different network, disable ad blockers/extensions for this file, or try another browser.';
        state.screen = 'create'; render(); return;
      }
      state.role = 'p1'; state.isHost = true;
      startHost(name, state.playerCount, null, null);
    };
  }

  function openHostPeer(name, attempt, fixedCode){
    const code = fixedCode || genCode();
    let peer;
    try { peer = new Peer(PEER_PREFIX + code); }
    catch(e){ state.error = 'Could not start the connection library (' + e.message + '). Try reloading the page.'; state.screen = 'create'; render(); return; }
    state.peer = peer;
    peer.on('open', () => { state.code = code; state.screen = 'lobby'; saveSession(); render(); });
    peer.on('connection', conn => { wireHostIncoming(conn); });
    peer.on('error', (err) => {
      if(err.type === 'unavailable-id'){
        if(fixedCode && attempt < 5){ peer.destroy(); setTimeout(() => openHostPeer(name, attempt + 1, fixedCode), 800); return; }
        if(!fixedCode && attempt < 3){ peer.destroy(); openHostPeer(name, attempt + 1); return; }
      }
      state.error = 'Could not open the case (connection service unreachable — error: ' + err.type + '). Check your internet connection and try again.';
      state.screen = 'create'; render();
    });
  }

  function startHost(name, playerCount, fixedCode, existingRoom){
    state.role = 'p1'; state.isHost = true;
    state.room = existingRoom || newRoom(name, playerCount);
    state.playerCount = playerCount;
    state.name = name;
    openHostPeer(name, 0, fixedCode);
  }

  function renderJoin(){
    root.innerHTML = `
      <h1 class="title">JOIN A CASE</h1>
      <p class="subtitle">Enter the code your host gave you.</p>
      <div class="field"><label>Case code</label><input type="text" id="inpCode" maxlength="5" style="text-transform:uppercase; letter-spacing:4px; font-family:'JetBrains Mono',monospace;" placeholder="ABCDE" /></div>
      <div class="field"><label>Your name</label><input type="text" id="inpName" maxlength="24" placeholder="e.g. Agent Cole" /></div>
      ${state.error ? `<div class="error-msg">${esc(state.error)}</div>` : ''}
      <div class="btn-row"><button class="secondary" id="btnBack">Back</button><button id="btnJoin">Join Case</button></div>
    `;
    document.getElementById('btnBack').onclick = () => { state.screen='landing'; render(); };
    document.getElementById('btnJoin').onclick = () => {
      const code = document.getElementById('inpCode').value.trim().toUpperCase();
      const name = document.getElementById('inpName').value.trim();
      if(!code || !name){ state.error = 'Enter both the code and your name.'; render(); return; }
      connectAsGuest(code, name);
    };
  }

  async function connectAsGuest(code, name){
    state.code = code; state.name = name; state.isHost = false; state.error = null;

    root.innerHTML = `<p class="waiting-line">Loading connection library<span class="dots"></span></p>`;
    const ready = await window.__peerjsReady;
    if(!ready){
      state.error = 'Could not load the connection library from any source. This usually means a firewall, VPN, or browser extension is blocking script downloads. Try a different network, disable ad blockers/extensions for this file, or try another browser.';
      state.screen = 'join'; render(); return;
    }

    let peer;
    try { peer = new Peer(); }
    catch(e){ state.error = 'Could not start the connection library (' + e.message + '). Try reloading the page.'; state.screen = 'join'; render(); return; }
    state.peer = peer;
    peer.on('open', () => {
      const conn = peer.connect(PEER_PREFIX + code, { reliable: true });
      state.hostConn = conn;
      conn.on('open', () => {
        setConnStatus(true);
        conn.send({ type: 'join', name });
        state.screen = 'lobby';
        saveSession();
        render();
      });
      conn.on('data', msg => {
        if(msg.type === 'assignedRole'){ state.role = msg.role; saveSession(); render(); }
        else if(msg.type === 'state'){
          state.room = msg.room;
          if(state.room.status === 'setup' && state.screen === 'lobby') state.screen = 'setup';
          if(state.room.status === 'playing') state.screen = 'playing';
          if(state.room.status === 'ended') state.screen = 'ended';
          render();
        } else if(msg.type === 'full'){
          state.error = 'This case already has its full roster of investigators, and the name doesn\'t match any of them.';
          render();
        }
      });
      conn.on('close', () => { setConnStatus(false); render(); });
      conn.on('error', () => { setConnStatus(false); render(); });
    });
    peer.on('error', (err) => {
      if(err.type === 'peer-unavailable'){ state.error = 'No case file found with that code. Double check it, and make sure the case-opener\'s tab is still open.'; }
      else { state.error = 'Could not reach the connection service (error: ' + err.type + '). Check your internet connection and try again.'; }
      state.screen = 'join'; render();
    });
  }

  function renderLobby(){
    const r = state.room;
    if(state.isHost){
      const joinedNames = r.order.filter(role => r.players[role].joined).map(role => r.players[role].name);
      const remaining = r.order.length - joinedNames.length;
      root.innerHTML = `
        <span class="role-badge">YOU ARE P1 · ${esc(state.name)}</span>
        <h1 class="title">CASE OPENED</h1>
        <p class="subtitle">Share this code with your co-investigator${r.order.length > 2 ? 's' : ''}. Keep this tab open.</p>
        <div class="code-display">${esc(state.code)}</div>
        <div class="roster">${joinedNames.map(n => `<div class="roster-row"><span class="yes">✔</span> ${esc(n)}</div>`).join('')}</div>
        ${remaining > 0 ? `<p class="waiting-line">Waiting for ${remaining} more investigator(s)<span class="dots"></span></p>` : ''}
      `;
      if(r.status === 'setup'){ state.screen = 'setup'; render(); }
    } else {
      root.innerHTML = `
        <h1 class="title">CONNECTING</h1>
        <p class="waiting-line">Linking up with the case file<span class="dots"></span></p>
        ${state.error ? `<div class="error-msg">${esc(state.error)}</div>` : ''}
      `;
    }
  }

  function renderSetup(){
    const r = state.room;
    const myRole = state.role;
    const ownerForMe = prevRole(r.order, myRole);
    const ownerName = r.players[ownerForMe].name;
    const iSubmitted = r.submitted[ownerForMe];
    const totalSubmitted = r.order.filter(role => r.submitted[role]).length;

    if(iSubmitted){
      root.innerHTML = `
        <span class="role-badge">YOU ARE ${myRole.toUpperCase()} · ${esc(state.name)}</span>
        <h1 class="title">FILE SUBMITTED</h1>
        <p class="waiting-line">You've assigned ${esc(ownerName)}'s identity. ${totalSubmitted} of ${r.order.length} files sealed<span class="dots"></span></p>
      `;
      if(r.status === 'playing'){ state.screen = 'playing'; render(); }
      return;
    }

    const query = state.characterSearch.toLowerCase();
    const filtered = CHAR_LIST.filter(c => c.n.toLowerCase().includes(query)).slice(0, 40);

    root.innerHTML = `
      <span class="role-badge">YOU ARE ${myRole.toUpperCase()} · ${esc(state.name)}</span>
      <h1 class="title">ASSIGN THEIR IDENTITY</h1>
      <p class="subtitle">Choose who <strong>${esc(ownerName)}</strong> will have to guess. Once the game starts, everyone except ${esc(ownerName)} will be able to see it.</p>
      ${state.selectedChar ? `<div class="selected-preview">Selected: ${esc(state.selectedChar)}</div>` : ''}
      <div class="search-box field"><label>Search the file index</label><input type="text" id="inpSearch" placeholder="Type to search characters &amp; celebrities" value="${esc(state.characterSearch)}" /></div>
      <div class="char-grid" id="charGrid">${filtered.map(c => `<button type="button" class="char-chip${state.selectedChar===c.n?' selected':''}" data-name="${esc(c.n)}">${esc(c.n)}</button>`).join('')}</div>
      <div class="field"><label>Or write your own</label><input type="text" id="inpCustom" maxlength="40" placeholder="Any character or celebrity" /></div>
      ${state.error ? `<div class="error-msg">${esc(state.error)}</div>` : ''}
      <button class="wide" id="btnSubmitChar">Seal Their File</button>
    `;

    document.getElementById('inpSearch').oninput = (e) => {
      state.characterSearch = e.target.value; render();
      const v = document.getElementById('inpSearch'); v.focus(); v.setSelectionRange(v.value.length, v.value.length);
    };
    document.querySelectorAll('.char-chip').forEach(btn => {
      btn.onclick = () => { state.selectedChar = btn.getAttribute('data-name'); document.getElementById('inpCustom').value=''; render(); };
    });
    document.getElementById('inpCustom').oninput = (e) => { if(e.target.value.trim()) state.selectedChar = null; };

    document.getElementById('btnSubmitChar').onclick = () => {
      const customVal = document.getElementById('inpCustom').value.trim();
      const finalChar = customVal || state.selectedChar;
      if(!finalChar){ state.error = 'Pick a character from the list or write your own.'; render(); return; }
      doAction('submitCharacter', { text: finalChar });
      state.error = null; state.selectedChar = null; state.characterSearch = '';
      render();
    };
  }

  function renderPlaying(){
    loadYouTubeAPI();
    const r = state.room;
    const myRole = state.role;
    const myName = state.name;
    const others = r.order.filter(role => role !== myRole);
    const isMyTurn = r.turn === myRole && !r.solved[myRole];
    const pending = r.pending;
    const turnName = r.players[r.turn].name;

    let actionHtml = '';
    if(pending){
      const askerName = r.players[pending.by].name;
      if(pending.by === myRole){
        actionHtml = `<p class="waiting-line">Waiting for someone to respond<span class="dots"></span></p>`;
      } else {
        const label = pending.type === 'guess' ? askerName + ' guessed their identity is:' : askerName + ' asked:';
        const respButtons = pending.type === 'guess'
          ? `<div class="btn-row"><button data-resp="correct">Correct!</button><button class="secondary" data-resp="incorrect">Not quite</button></div>`
          : `<div class="btn-row"><button data-resp="yes">Yes</button><button data-resp="no">No</button><button class="secondary" data-resp="unsure">Unsure</button></div>`;
        actionHtml = `<div class="pending-box"><div class="file-label">${label}</div><div class="q-text">${esc(pending.text)}</div>${respButtons}</div>`;
      }
    } else if(isMyTurn){
      if(state.showGuessBox){
        actionHtml = `
          <div class="field"><label>Guess your identity</label><input type="text" id="inpGuess" placeholder="Who am I?" /></div>
          <div class="btn-row"><button class="secondary" id="btnCancelGuess">Back to questions</button><button id="btnSubmitGuess">Submit Guess</button></div>
        `;
      } else {
        actionHtml = `
          <div class="field"><label>Ask a yes/no question about yourself</label><input type="text" id="inpQuestion" placeholder="Am I a fictional character?" /></div>
          <div class="btn-row"><button id="btnAskQuestion">Ask</button><button class="secondary" id="btnOpenGuess">Make a Guess Instead</button></div>
        `;
      }
    } else {
      actionHtml = `<p class="waiting-line">Waiting for ${esc(turnName)}'s turn<span class="dots"></span></p>`;
    }

    const logHtml = r.log.length ? r.log.slice().reverse().map(e => {
      const whoName = r.players[e.role].name;
      let respHtml = '';
      if(e.response){
        const cls = e.response === 'yes' || e.response === 'correct' ? 'yes' : (e.response === 'no' || e.response === 'incorrect' ? 'no' : 'unsure');
        const responderName = e.respondedBy ? r.players[e.respondedBy].name : '';
        const label = e.type === 'guess'
          ? (e.response === 'correct' ? '✔ Confirmed correct by ' + esc(responderName) : '✘ Incorrect (per ' + esc(responderName) + ')')
          : ('→ ' + e.response.charAt(0).toUpperCase() + e.response.slice(1) + ' (' + esc(responderName) + ')');
        respHtml = `<div class="resp ${cls}">${label}</div>`;
      }
      const isGuessWrong = e.type === 'guess' && e.response === 'incorrect';
      return `<div class="entry${isGuessWrong ? ' guess-wrong' : ''}"><div class="who">${esc(whoName)} ${e.type === 'guess' ? 'guessed' : 'asked'}</div><div class="txt">${esc(e.text)}</div>${respHtml}</div>`;
    }).join('') : `<p class="waiting-line" style="padding:14px 0;">No questions yet — the investigation begins now.</p>`;

    const knownFilesHtml = others.map(role => `
      <div class="file-card">
        <div class="stamp solved">${r.solved[role] ? 'CRACKED' : 'KNOWN TO YOU'}</div>
        <div class="file-label">${esc(r.players[role].name)}'s File</div>
        <div class="file-value">${esc(r.assignments[role])}</div>
      </div>
    `).join('');

    const scoreboardHtml = r.order.map(role => {
      const cls = ['score-chip'];
      if(role === r.turn && !r.solved[role]) cls.push('is-turn');
      if(r.solved[role]) cls.push('is-solved');
      const count = r.guessCounts[role] || 0;
      const turns = r.turnsTaken[role] || 0;
      const tag = r.solved[role] ? ' · SOLVED' : '';
      return `<span class="${cls.join(' ')}">${esc(r.players[role].name)} · ${turns} turn${turns === 1 ? '' : 's'} · ${count} guess${count === 1 ? '' : 'es'}${tag}</span>`;
    }).join('');

    const queueListHtml = r.musicQueue.length
      ? r.musicQueue.map(q => `<div class="roster-row">${esc(q.videoId)} <span style="color:var(--ink-soft)">— queued by ${esc(r.players[q.addedBy].name)}</span></div>`).join('')
      : '<div class="waiting-line" style="padding:6px 0;">Queue is empty</div>';
    const nowPlayingLine = r.nowPlaying
      ? 'Now playing <strong>' + esc(r.nowPlaying.videoId) + '</strong> — queued by ' + esc(r.players[r.nowPlaying.addedBy].name)
      : 'Nothing playing yet — add a track below';

    root.innerHTML = `
      <span class="role-badge">YOU ARE ${myRole.toUpperCase()} · ${esc(myName)}${r.solved[myRole] ? ' · SOLVED' : ''}</span>
      <h1 class="title">ACTIVE INVESTIGATION</h1>
      <div class="turn-banner">${isMyTurn ? 'It is your turn' : (r.solved[myRole] ? 'Waiting — you may still answer others' : 'Current turn: ' + esc(turnName))}</div>
      <div class="scoreboard">${scoreboardHtml}</div>
      <div class="two-col">
        <div class="file-card"><div class="stamp">CLASSIFIED</div><div class="file-label">Your File (${esc(myName)})</div><div class="file-value"><span class="redaction-bar">REDACTED&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div></div>
        ${knownFilesHtml}
      </div>
      <hr class="divider" />
      <div class="transcript">${logHtml}</div>
      <details class="notes-box">
        <summary>Your Notes (private)</summary>
        <textarea id="inpNotes" placeholder="Jot down clues, ruled-out guesses, hunches...">${esc(state.notes)}</textarea>
      </details>
      <details class="notes-box">
        <summary>🎵 Music Queue</summary>
        <p class="waiting-line" style="text-align:left; font-style:normal;">${nowPlayingLine}</p>
        <div class="field"><label>Add a YouTube link</label><input type="text" id="inpYoutube" placeholder="Paste a YouTube URL" /></div>
        ${state.queueError ? `<div class="error-msg">${esc(state.queueError)}</div>` : ''}
        <div class="btn-row">
          <button id="btnQueueAdd">Add to Queue</button>
          ${r.nowPlaying ? '<button class="secondary" id="btnQueueSkip">Skip</button>' : ''}
        </div>
        <div class="roster" style="margin-top:12px;">${queueListHtml}</div>
      </details>
      ${actionHtml}
    `;

    document.getElementById('inpNotes').oninput = (e) => {
      state.notes = e.target.value;
      const pos = e.target.selectionStart;
      requestAnimationFrame(() => {
        const ta = document.getElementById('inpNotes');
        if(ta){ ta.focus(); ta.setSelectionRange(pos, pos); }
      });
    };

    document.getElementById('btnQueueAdd').onclick = () => {
      const raw = document.getElementById('inpYoutube').value.trim();
      const vid = extractYouTubeId(raw);
      if(!vid){ state.queueError = 'Could not read a video ID from that link. Paste a full YouTube URL.'; render(); return; }
      state.queueError = null;
      doAction('queueAdd', { videoId: vid });
      render();
    };
    if(r.nowPlaying){
      const skipBtn = document.getElementById('btnQueueSkip');
      if(skipBtn) skipBtn.onclick = () => { doAction('queueSkip', {}); render(); };
    }

    if(!pending && isMyTurn && !state.showGuessBox){
      document.getElementById('btnAskQuestion').onclick = () => {
        const q = document.getElementById('inpQuestion').value.trim();
        if(!q) return;
        doAction('ask', { text: q }); render();
      };
      document.getElementById('btnOpenGuess').onclick = () => { state.showGuessBox = true; render(); };
    } else if(!pending && isMyTurn && state.showGuessBox){
      document.getElementById('btnCancelGuess').onclick = () => { state.showGuessBox = false; render(); };
      document.getElementById('btnSubmitGuess').onclick = () => {
        const g = document.getElementById('inpGuess').value.trim();
        if(!g) return;
        doAction('guess', { text: g }); state.showGuessBox = false; render();
      };
    } else if(pending && pending.by !== myRole){
      document.querySelectorAll('[data-resp]').forEach(btn => {
        btn.onclick = () => { doAction('respond', { resp: btn.getAttribute('data-resp') }); render(); };
      });
    }
  }

  function renderEnded(){
    const r = state.room;
    const winnerName = r.players[r.winner].name;
    const finishOrder = r.solveOrder.slice();
    if(r.loser) finishOrder.push(r.loser);
    const rankHtml = finishOrder.map((role, i) => {
      const isLast = r.loser && role === r.loser;
      const place = isLast ? 'LAST' : (i+1) + (i===0?'st':i===1?'nd':i===2?'rd':'th');
      const guesses = r.guessCounts[role] || 0;
      const turns = r.turnsTaken[role] || 0;
      return `<div class="rank-row${isLast ? ' last-place' : ''}"><span class="place">${place}</span>${esc(r.players[role].name)} <span style="color:var(--ink-soft)">(${turns} turn${turns===1?'':'s'} · ${guesses} guess${guesses===1?'':'es'})</span></div>`;
    }).join('');
    root.innerHTML = `
      <span class="role-badge">YOU ARE ${state.role.toUpperCase()} · ${esc(state.name)}</span>
      <h1 class="title">CASE CLOSED</h1>
      <div class="winner-banner">${esc(winnerName)} cracked their case first</div>
      <div class="roster">${rankHtml}</div>
      <hr class="divider" />
      <div class="two-col">
        ${r.order.map(role => `
          <div class="file-card"><div class="stamp solved">IDENTIFIED</div><div class="file-label">${esc(r.players[role].name)}'s File</div><div class="file-value">${esc(r.assignments[role])}</div></div>
        `).join('')}
      </div>
      <hr class="divider" />
      <button class="wide" id="btnNewGame">Open a New Case</button>
    `;
    document.getElementById('btnNewGame').onclick = () => {
      if(state.peer) state.peer.destroy();
      clearSession();
      state = { screen: 'landing', code:null, name:null, role:null, isHost:false, room:null, error:null, characterSearch:'', selectedChar:null, showGuessBox:false, playerCount:3, notes:'', queueError:null, peer:null, conns:{}, hostConn:null, connectedCount:0 };
      setConnStatus(false);
      render();
    };
  }

  function render(){
    syncMusicPlayer();
    if(state.screen === 'resume') return renderResume();
    if(state.screen === 'landing') return renderLanding();
    if(state.screen === 'create') return renderCreate();
    if(state.screen === 'join') return renderJoin();
    if(state.screen === 'lobby') return renderLobby();
    if(state.screen === 'setup') return renderSetup();
    if(state.screen === 'playing') return renderPlaying();
    if(state.screen === 'ended') return renderEnded();
  }

  // ---------- Click feedback (synthesized, no audio file needed) ----------
  let audioCtx = null;
  function playClickSound(){
    try {
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(1400, t0);
      osc.frequency.exponentialRampToValueAtTime(220, t0 + 0.045);
      gain.gain.setValueAtTime(0.07, t0);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + 0.07);
    } catch(e){ /* audio unavailable — fail silently */ }
  }
  document.addEventListener('click', (e) => {
    if(e.target && e.target.closest && e.target.closest('.dossier-app button')) playClickSound();
  }, true);

  // ---------- YouTube-based music queue ----------
  const musicToggleEl = document.getElementById('musicToggle');
  const musicVolumeEl = document.getElementById('musicVolume');
  let ytApiLoadStarted = false;
  let ytPlayer = null;
  let ytReady = false;
  let audioJoined = false;
  let currentPlayingKey = null;

  function loadYouTubeAPI(){
    if(ytApiLoadStarted) return;
    ytApiLoadStarted = true;
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
    window.onYouTubeIframeAPIReady = function(){
      ytPlayer = new YT.Player('ytPlayerHost', {
        height: '1', width: '1',
        playerVars: { autoplay: 1, controls: 0, disablekb: 1, modestbranding: 1, rel: 0, playsinline: 1 },
        events: {
          onReady: (e) => {
            ytReady = true;
            try { e.target.mute(); e.target.setVolume(Number(musicVolumeEl ? musicVolumeEl.value : 35)); } catch(err){}
            syncMusicPlayer();
          },
          onStateChange: (e) => {
            if(e.data === YT.PlayerState.ENDED && state.isHost){
              doAction('queueSkip', {});
            }
          }
        }
      });
    };
  }

  function extractYouTubeId(input){
    if(!input) return null;
    input = input.trim();
    const m = input.match(/(?:youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/);
    if(m) return m[1];
    if(/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
    return null;
  }

  function syncMusicPlayer(){
    if(!ytReady || !ytPlayer || !state.room) return;
    const np = state.room.nowPlaying;
    const key = np ? (np.queueId || '') + '|' + np.startedAt : null;
    if(key === currentPlayingKey) return;
    currentPlayingKey = key;
    try {
      if(!np){ ytPlayer.stopVideo(); }
      else {
        const elapsed = Math.max(0, (Date.now() - np.startedAt) / 1000);
        ytPlayer.loadVideoById({ videoId: np.videoId, startSeconds: elapsed });
      }
    } catch(err){ /* player not fully ready yet — will resync on next state change */ }
  }

  if(musicVolumeEl){
    musicVolumeEl.addEventListener('input', () => {
      if(ytReady && ytPlayer){ try { ytPlayer.setVolume(Number(musicVolumeEl.value)); } catch(err){} }
    });
  }
  if(musicToggleEl){
    musicToggleEl.addEventListener('click', () => {
      if(!ytReady || !ytPlayer){ return; }
      try {
        if(audioJoined){
          ytPlayer.mute();
          audioJoined = false;
          musicToggleEl.textContent = '🔊 AUDIO OFF';
          musicToggleEl.classList.add('off');
        } else {
          ytPlayer.unMute();
          ytPlayer.setVolume(Number(musicVolumeEl ? musicVolumeEl.value : 35));
          audioJoined = true;
          musicToggleEl.textContent = '🔊 AUDIO ON';
          musicToggleEl.classList.remove('off');
        }
      } catch(err){}
    });
  }

  pendingResume = loadSession();
  if(pendingResume && pendingResume.code && pendingResume.name){
    state.screen = 'resume';
  }
  render();
})();
</script>
</body>
</html>
